name: Deploy site to GitHub Pages

# Pubblica il sito statico AwakerHz su GitHub Pages, GRATIS.
# Si attiva da solo a ogni push su main (e si puo' lanciare a mano da Actions).
# Niente build, niente dipendenze: carica i file statici cosi' come sono.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola deploy alla volta
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (abilita Pages in automatico)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepara la cartella del sito (esclude file interni al repo)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='_reference' \
            --exclude='_screenshot' \
            ./ _site/

      - name: Carica l'artefatto del sito
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
